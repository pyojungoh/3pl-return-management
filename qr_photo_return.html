}

.qr-scan-guide {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 250px;
  height: 250px;
  border: 3px solid #4CAF50;
  border-radius: 12px;
  pointer-events: none;
  box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
}

.qr-scan-guide::before {
  content: '';
  position: absolute;
  top: -3px;
  left: -3px;
  width: 30px;
  height: 30px;
  border-top: 4px solid #4CAF50;
  border-left: 4px solid #4CAF50;
  border-radius: 12px 0 0 0;
}

.qr-scan-guide::after {
  content: '';
  position: absolute;
  bottom: -3px;
  right: -3px;
  width: 30px;
  height: 30px;
  border-bottom: 4px solid #4CAF50;
  border-right: 4px solid #4CAF50;
  border-radius: 0 0 12px 0;
}

.qr-status-message {

  <script>
/**
 * QR 자동 스캔 및 사진 촬영 모듈
 * 기존 index.html의 기능을 재사용하여 모듈화
 */

// ========= 전역 변수 =========
let qrStream = null;
let qrScanInterval = null;
let photoStream = null;
let selectedPhotos = [];
let uploadedPhotos = [];
let currentTrackingNumber = '';
let currentReturnData = null;
let availableMonths = [];
let isUploading = false;
let currentPhotoSessionId = '';
let qrFrameSkip = 0;

function decodeQrBinaryPayload(binaryData) {
    if (!binaryData || !binaryData.length) return '';
    try {
        if (typeof TextDecoder !== 'undefined') {
            return new TextDecoder('utf-8').decode(new Uint8Array(binaryData));
        }
    } catch (e) {
        // fallback below
    }
    try {
        let out = '';
        for (let i = 0; i < binaryData.length; i++) {
            out += String.fromCharCode((binaryData[i] || 0) & 0xff);
        }
        return out;
    } catch (e2) {
        return '';
    }
}

function extractQrValue(code) {
    if (!code) return '';
    if (typeof code.data === 'string' && code.data.length > 0) return code.data;
    if (typeof code.text === 'string' && code.text.length > 0) return code.text;
    const fromBinary = decodeQrBinaryPayload(code.binaryData);
    if (fromBinary && fromBinary.length > 0) return fromBinary;
    // 최후 fallback: 객체를 문자열화해도 비면 빈값
    try {
        return String(code.data || code.text || '');
    } catch (e) {
        return '';
    }
}

function tryDecodeQrFromCanvas(ctx, sx, sy, sw, sh) {
    try {
        const imageData = ctx.getImageData(sx, sy, sw, sh);
        return jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'attemptBoth'
        });
    } catch (e) {
        return null;
    }
}

// ========= 초기화 =========
document.addEventListener('DOMContentLoaded', function() {
    console.log('📱 QR 자동 스캔 페이지 초기화');
    
    // 월 목록 로드
    loadAvailableMonths();
    
    // 페이지 로드 시 자동으로 QR 스캔 시작
    setTimeout(() => {
        startAutoQRScan();
    }, 500);
});

// ========= 월 목록 로드 =========
async function loadAvailableMonths() {
    try {
        const response = await fetch('/api/returns/available-months');
        const data = await response.json();
        
        if (data.success) {
            availableMonths = data.months || [];
            console.log('✅ 월 목록 로드 완료:', availableMonths.length, '개');
        } else {
            console.error('❌ 월 목록 로드 실패:', data.message);
        }
    } catch (error) {
        console.error('❌ 월 목록 로드 오류:', error);
    }
}

// ========= QR 자동 스캔 시작 =========
async function startAutoQRScan() {
    console.log('🔍 QR 자동 스캔 시작');
    
    const qrScanMode = document.querySelector('.qr-scan-mode');
    const qrStatusMessage = document.getElementById('qrStatusMessage');
    
    // HTTPS 체크
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        showQRStatus('⚠️ 카메라 사용을 위해 HTTPS가 필요합니다.', 'error');
        return;
    }
    
    // 미디어 디바이스 지원 확인
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showQRStatus('⚠️ 이 브라우저는 카메라를 지원하지 않습니다.', 'error');
        showManualInputMode();
        return;
    }
    
    // jsQR 라이브러리 확인
    if (typeof jsQR === 'undefined') {
        showQRStatus('⚠️ QR 스캔 라이브러리를 로드할 수 없습니다.', 'error');
        showManualInputMode();
        return;
    }
    
    try {
        showQRStatus('카메라 권한을 요청하는 중...', '');
        
        // QR 스캔용 카메라 설정 (인식 우선)
        const constraints = {
            video: {
                facingMode: 'environment',
                width: { ideal: 1280, max: 1920 },
                height: { ideal: 720, max: 1080 }
            }
        };
        
        qrStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        const qrVideo = document.getElementById('qrVideo');
        qrVideo.srcObject = qrStream;
        qrVideo.setAttribute('playsinline', 'true');
        qrVideo.setAttribute('webkit-playsinline', 'true');
        
        await qrVideo.play();

        // 지원 단말에서는 연속 초점/확대 적용 (인식률 개선)
        try {
            const track = qrStream.getVideoTracks && qrStream.getVideoTracks()[0];
            if (track && track.getCapabilities) {
                const caps = track.getCapabilities();
                const adv = {};
                if (caps.focusMode && caps.focusMode.indexOf('continuous') >= 0) adv.focusMode = 'continuous';
                if (typeof caps.zoom === 'object' && caps.zoom.max >= 1.5) adv.zoom = Math.min(2.0, caps.zoom.max);
                if (Object.keys(adv).length > 0 && track.applyConstraints) {
                    await track.applyConstraints({ advanced: [adv] });
                }
            }
        } catch (focusErr) {
            console.log('ℹ️ 포커스/줌 제어 미지원:', focusErr && focusErr.message ? focusErr.message : focusErr);
        }
        
        qrScanMode.classList.remove('hidden');
        showQRStatus('QR 코드를 카메라에 비춰주세요.', '');
        
        // Canvas 생성
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        qrVideo.addEventListener('loadedmetadata', function() {
            // 디코딩 성능/정확도 균형을 위해 내부 캔버스 크기 제한
            const vw = qrVideo.videoWidth || 1280;
            const vh = qrVideo.videoHeight || 720;
            const maxW = 960;
            const scale = Math.min(1, maxW / vw);
            canvas.width = Math.max(320, Math.floor(vw * scale));
            canvas.height = Math.max(240, Math.floor(vh * scale));
            console.log('📹 비디오 크기:', canvas.width, 'x', canvas.height);
        }, { once: true });
        
        // QR 코드 감지 루프
        let scanAttempts = 0;
        qrScanInterval = setInterval(function() {
            if (qrVideo.readyState === qrVideo.HAVE_ENOUGH_DATA && canvas.width > 0 && canvas.height > 0) {
                try {
                    // 너무 자주 디코딩하면 일부 단말에서 오히려 인식률/프레임 저하
                    qrFrameSkip = (qrFrameSkip + 1) % 2;
                    if (qrFrameSkip !== 0) return;

                    context.drawImage(qrVideo, 0, 0, canvas.width, canvas.height);
                    // 중앙 가이드 영역 우선 스캔 -> 실패 시 전체 스캔
                    const roiW = Math.floor(canvas.width * 0.62);
                    const roiH = Math.floor(canvas.height * 0.62);
                    const roiX = Math.floor((canvas.width - roiW) / 2);
                    const roiY = Math.floor((canvas.height - roiH) / 2);

                    let code = tryDecodeQrFromCanvas(context, roiX, roiY, roiW, roiH);
                    if (!code) {
                        code = tryDecodeQrFromCanvas(context, 0, 0, canvas.width, canvas.height);
                    }
                    
                    if (code) {
                        const qrValueRaw = extractQrValue(code);
                        const qrValue = (qrValueRaw || '').trim();
                        if (!qrValue) {
                            // 일부 디바이스에서 빈 payload가 감지되는 케이스: 재시도
                            console.warn('⚠️ QR 감지됨(빈 payload) - 재스캔');
                        } else {
                            console.log('✅ QR 코드 감지됨:', qrValue);
                            handleQRDetected(qrValue);
                        }
                    }
                    
                    scanAttempts++;
                    if (scanAttempts % 100 === 0) {
                        console.log('🔍 QR 스캔 시도:', scanAttempts, '회');
                    }
                } catch (err) {
                    console.error('❌ QR 스캔 오류:', err);
                }
            }
        }, 150);
        
    } catch (error) {
        console.error('❌ 카메라 오류:', error);
        handleCameraError(error);
    }
}

// ========= QR 코드 감지 처리 =========
async function handleQRDetected(rawValue) {
    const scannedText = (rawValue == null ? '' : String(rawValue)).trim();
    console.log('📦 QR 코드 인식 완료:', scannedText);
    
    stopQRScan();

    if (!scannedText) {
        showQRStatus('⚠️ QR 데이터가 비어 있습니다. 다시 시도해주세요.', 'error');
        setTimeout(() => startAutoQRScan(), 1200);
        return;
    }

    const parsed = parseScannedPayload(scannedText);
    if (parsed.mode === 'legacy_storage_qr') {
        showLegacyGoogleFormModal(scannedText);
        return;
    }
    if (parsed.mode === 'pallet_track') {
        await openPalletTrackFlow(parsed.palletId);
        return;
    }
    if (parsed.mode === 'vendor_return') {
        await processVendorReturnByQr(scannedText, parsed);
        return;
    }
    currentPhotoSessionId = parsed.sessionId || '';
    currentTrackingNumber = (parsed.trackingNumber || scannedText || '').trim();
    
    if (!currentTrackingNumber) {
        showQRStatus('⚠️ 송장번호를 읽을 수 없습니다. 다시 시도해주세요.', 'error');
        setTimeout(() => startAutoQRScan(), 1500);
        return;
    }
    
    if (currentPhotoSessionId) {
        showQRStatus('✅ QR 코드 인식 완료! 사진 촬영 모드로 이동합니다.', 'success');
        currentReturnData = {
            company_name: '',
            product: '',
            customer_name: '',
            tracking_number: currentTrackingNumber,
            month: null
        };
        updateInfoPanel();
        await switchToPhotoMode();
        return;
    }
    
    showQRStatus('✅ QR 코드 인식 완료! 데이터 검색 중...', 'success');
    await searchReturnData(currentTrackingNumber);
}

// ========= 반품 데이터 검색 =========
async function searchReturnData(trackingNumber) {
    try {
        // 현재 월 자동 선택
        const today = new Date();
        const currentMonth = `${today.getFullYear()}년${today.getMonth()+1}월`;
        let selectedMonth = currentMonth;
        
        if (!availableMonths.includes(currentMonth) && availableMonths.length > 0) {
            selectedMonth = availableMonths[0];
        }
        
        if (!selectedMonth) {
            showQRStatus('⚠️ 사용 가능한 월 데이터가 없습니다.', 'error');
            showManualInputMode();
            return;
        }
        
        console.log('🔍 데이터 검색 시작:', trackingNumber, selectedMonth);
        
        const response = await fetch(
            `/api/uploads/find-by-tracking?trackingNumber=${encodeURIComponent(trackingNumber)}&month=${encodeURIComponent(selectedMonth)}`
        );
        const data = await response.json();
        
        if (data.success && data.data) {
            console.log('✅ 데이터 검색 완료:', data.data);
            
            // 반품 데이터 저장
            currentReturnData = {
                return_date: new Date().toISOString().split('T')[0],
                company_name: data.data.company || '',
                product: data.data.product || '',
                customer_name: data.data.customer || '',
                tracking_number: trackingNumber,
                return_type: null, // NULL로 저장 (빈 문자열 대신)
                stock_status: null, // NULL로 저장 (빈 문자열 대신)
                inspection: null,
                completed: null,
                memo: null,
                photo_links: null,
                other_courier: null,
                shipping_fee: null,
                client_request: null,
                client_confirmed: null,
                month: selectedMonth
            };
            
            // 사진 촬영 모드로 전환
            switchToPhotoMode();
            
        } else {
            console.warn('⚠️ 데이터를 찾을 수 없음');
            showQRStatus('⚠️ 해당 송장번호 데이터를 찾을 수 없습니다.', 'error');
            
            // 수동 입력 모드 표시
            setTimeout(() => {
                showManualInputMode();
            }, 2000);
        }
        
    } catch (error) {
        console.error('❌ 데이터 검색 오류:', error);
        showQRStatus('⚠️ 데이터 검색 중 오류가 발생했습니다.', 'error');
        showManualInputMode();
    }
}

// ========= 사진 촬영 모드로 전환 =========
async function switchToPhotoMode() {
    console.log('📷 사진 촬영 모드로 전환');
    
    // QR 스캔 모드 숨기기
    document.querySelector('.qr-scan-mode').classList.add('hidden');
    
    // 사진 촬영 모드 표시
    const photoMode = document.querySelector('.photo-mode');
    photoMode.classList.add('active');
    
    // 정보 패널 표시
    updateInfoPanel();
    
    // 사진 촬영용 카메라 시작
    await startPhotoCamera();
}

// ========= 사진 촬영용 카메라 시작 =========
async function startPhotoCamera() {
    try {
        // QR 스캔 카메라 정리
        if (qrStream) {
            qrStream.getTracks().forEach(track => track.stop());
            qrStream = null;
        }
        
        // 사진 촬영용 카메라 설정 (높은 해상도)
        const constraints = {
            video: {
                facingMode: 'environment',
                width: { ideal: 1920, max: 3840 },
                height: { ideal: 1080, max: 2160 }
            }
        };
        
        photoStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        const photoVideo = document.getElementById('photoVideo');
        photoVideo.srcObject = photoStream;
        photoVideo.setAttribute('playsinline', 'true');
        photoVideo.setAttribute('webkit-playsinline', 'true');
        
        await photoVideo.play();
        console.log('✅ 사진 촬영 카메라 시작 완료');
        
    } catch (error) {
        console.error('❌ 사진 촬영 카메라 오류:', error);
        showOverlay('카메라 오류', '사진 촬영 카메라를 시작할 수 없습니다.');
        setTimeout(() => hideOverlay(), 3000);
    }
}

// ========= 사진 촬영 =========
function capturePhoto() {
    const photoVideo = document.getElementById('photoVideo');
    
    if (photoVideo.readyState !== photoVideo.HAVE_ENOUGH_DATA) {
        console.warn('⚠️ 비디오가 준비되지 않음');
        return;
    }
    
    try {
        const canvas = document.createElement('canvas');
        canvas.width = photoVideo.videoWidth;
        canvas.height = photoVideo.videoHeight;
        
        const context = canvas.getContext('2d');
        context.drawImage(photoVideo, 0, 0, canvas.width, canvas.height);
        
        // Base64로 변환
        const photoData = canvas.toDataURL('image/jpeg', 0.8);
        
        // 사진 배열에 추가
        selectedPhotos.push(photoData);
        
        // 썸네일 업데이트
        updatePhotoThumbnails();
        
        console.log('📸 사진 촬영 완료:', selectedPhotos.length, '장');
        
        // 촬영 효과 (선택사항)
        flashEffect();
        
    } catch (error) {
        console.error('❌ 사진 촬영 오류:', error);
    }
}

// ========= 썸네일 업데이트 =========
function updatePhotoThumbnails() {
    const thumbnailsContainer = document.getElementById('photoThumbnails');
    const uploadBtn = document.getElementById('uploadBtn');
    
    thumbnailsContainer.innerHTML = '';
    
    selectedPhotos.forEach((photoData, index) => {
        const thumbnail = document.createElement('div');
        thumbnail.className = 'photo-thumbnail';
        
        const img = document.createElement('img');
        img.src = photoData;
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '×';
        deleteBtn.onclick = () => removePhoto(index);
        
        thumbnail.appendChild(img);
        thumbnail.appendChild(deleteBtn);
        thumbnailsContainer.appendChild(thumbnail);
    });
    
    // 업로드 버튼 표시/숨김
    if (selectedPhotos.length > 0) {
        uploadBtn.classList.remove('hidden');
        uploadBtn.textContent = `📤 업로드 (${selectedPhotos.length}장)`;
    } else {
        uploadBtn.classList.add('hidden');
    }
}

// ========= 사진 삭제 =========
function removePhoto(index) {
    selectedPhotos.splice(index, 1);
    updatePhotoThumbnails();
    console.log('🗑️ 사진 삭제:', selectedPhotos.length, '장 남음');
}

// ========= 즉시 업로드 =========
async function uploadPhotos() {
    if (isUploading) {
        console.log('⏳ 이미 업로드 중입니다.');
        return;
    }
    
    if (selectedPhotos.length === 0) {
        console.warn('⚠️ 업로드할 사진이 없습니다.');
        return;
    }
    
    if (!currentTrackingNumber) {
        console.error('❌ 송장번호가 없습니다.');
        return;
    }
    
    isUploading = true;
    const uploadBtn = document.getElementById('uploadBtn');
    uploadBtn.disabled = true;
    uploadBtn.textContent = '📤 업로드 중...';
    
    console.log('📤 사진 업로드 시작:', selectedPhotos.length, '장');
    showOverlay('사진 업로드 중', `${selectedPhotos.length}장의 사진을 업로드하고 있습니다...`);
    
    try {
        // 이미지 업로드
        const response = await fetch('/api/uploads/upload-images', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                images: selectedPhotos,
                trackingNumber: currentTrackingNumber
            })
        });
        
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            const text = await response.text();
            throw new Error(`서버 오류 (${response.status}): ${text.substring(0, 200)}`);
        }
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(data.message || `서버 오류 (${response.status})`);
        }
        
        if (data.success && data.photoLinks) {
            console.log('✅ 사진 업로드 완료:', data.photoLinks);
            const batchCount = selectedPhotos.length;
            
            if (currentPhotoSessionId) {
                await submitPhotosToSession(data.photoLinks);
            } else if (currentReturnData) {
                const existingLinks = currentReturnData.photo_links || '';
                const newLinks = existingLinks
                    ? `${existingLinks}\n${data.photoLinks}`
                    : data.photoLinks;
                currentReturnData.photo_links = newLinks;
            }
            
            uploadedPhotos.push(...selectedPhotos);
            selectedPhotos = [];
            updatePhotoThumbnails();
            
            hideOverlay();
            
            if (currentPhotoSessionId) {
                showOverlay('전송 완료', `${batchCount}장의 사진이 관리자 화면으로 전달되었습니다.`, 2000);
                setTimeout(() => {
                    resetToQRScanMode();
                }, 2000);
            } else {
                await saveReturnData();
                showOverlay('업로드 완료', `${batchCount}장의 사진이 업로드되었습니다.`, 2000);
                setTimeout(() => {
                    resetToQRScanMode();
                }, 2000);
            }
        } else {
            throw new Error(data.message || '사진 업로드 실패');
        }
        
    } catch (error) {
        console.error('❌ 사진 업로드 오류:', error);
        hideOverlay();
        showOverlay('업로드 실패', error.message || '사진 업로드 중 오류가 발생했습니다.', 3000);
    } finally {
        isUploading = false;
        uploadBtn.disabled = false;
    }
}

// ========= 반품 데이터 저장 =========
async function saveReturnData() {
    if (!currentReturnData) {
        console.warn('⚠️ 저장할 반품 데이터가 없습니다.');
        return;
    }
    
    try {
        console.log('💾 반품 데이터 저장 시작');
        
        const response = await fetch('/api/returns/create', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(currentReturnData)
        });
        
        const contentType = response.headers.get('content-type');
        if (!contentType || !contentType.includes('application/json')) {
            const text = await response.text();
            throw new Error(`서버 오류 (${response.status}): ${text.substring(0, 200)}`);
        }
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(data.message || `서버 오류 (${response.status})`);
        }
        
        if (data.success) {
            console.log('✅ 반품 데이터 저장 완료:', data.id);
        } else {
            throw new Error(data.message || '반품 데이터 저장 실패');
        }
        
    } catch (error) {
        console.error('❌ 반품 데이터 저장 오류:', error);
        // 저장 실패해도 사진은 업로드되었으므로 계속 진행
    }
}

async function submitPhotosToSession(photoLinks) {
    if (!currentPhotoSessionId) {
        console.warn('⚠️ 활성화된 사진 세션이 없습니다.');
        return false;
    }
    
    const response = await fetch('/api/uploads/photo-session/photos', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            sessionId: currentPhotoSessionId,
            trackingNumber: currentTrackingNumber,
            photoLinks
        })
    });
    
    const contentType = response.headers.get('content-type');
    if (!contentType || !contentType.includes('application/json')) {
        const text = await response.text();
        throw new Error(`세션 저장 오류 (${response.status}): ${text.substring(0, 200)}`);
    }
    
    const data = await response.json();
    if (!response.ok || !data.success) {
        throw new Error(data.message || '사진 세션 저장에 실패했습니다.');
    }
    console.log('✅ 사진 세션 업데이트 완료:', currentPhotoSessionId);
    return true;
}

// ========= QR 스캔 중단 =========
function stopQRScan() {
    console.log('⏹️ QR 스캔 중단');
    
    if (qrScanInterval) {
        clearInterval(qrScanInterval);
        qrScanInterval = null;
    }
    
    if (qrStream) {
        qrStream.getTracks().forEach(track => track.stop());
        qrStream = null;
    }
    
    const qrVideo = document.getElementById('qrVideo');
    if (qrVideo) {
        qrVideo.srcObject = null;
        qrVideo.pause();
    }
}

    console.log('⏹️ 사진 촬영 카메라 정리');
    
    if (photoStream) {
        photoStream.getTracks().forEach(track => track.stop());
        photoStream = null;
    }
    
    const photoVideo = document.getElementById('photoVideo');
    if (photoVideo) {
        photoVideo.srcObject = null;
        photoVideo.pause();

}

// ========= QR 스캔 모드로 복귀 =========
async function resetToQRScanMode() {
    console.log('🔄 QR 스캔 모드로 복귀');
    
    // 사진 촬영 모드 숨기기
    const photoMode = document.querySelector('.photo-mode');
    if (photoMode) {
        photoMode.classList.remove('active');
    }
    
    // 정보 패널 숨기기
    const infoPanel = document.getElementById('infoPanel');
    if (infoPanel) {
        infoPanel.classList.remove('show');
    }
    
    // 사진 촬영 카메라 정리
    stopPhotoCamera();
    
    // 변수 초기화
    selectedPhotos = [];
    uploadedPhotos = [];
    currentTrackingNumber = '';
    currentReturnData = null;
    currentPhotoSessionId = '';
    updatePhotoThumbnails();
    
    // QR 스캔 모드 표시
    const qrScanMode = document.querySelector('.qr-scan-mode');
    if (qrScanMode) {
        qrScanMode.classList.remove('hidden');
    }
    
    // QR 스캔 다시 시작
    setTimeout(() => {
        startAutoQRScan();
    }, 500);
}

// ========= 카메라 오류 처리 =========
function handleCameraError(error) {
    let errorMessage = '카메라를 사용할 수 없습니다.';
    
    if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
        errorMessage = '카메라 권한이 거부되었습니다. 브라우저 설정에서 카메라 권한을 허용해주세요.';
    } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
        errorMessage = '카메라를 찾을 수 없습니다.';
    } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
        errorMessage = '카메라가 다른 애플리케이션에서 사용 중입니다.';
    }
    
    showQRStatus('⚠️ ' + errorMessage, 'error');
    showManualInputMode();
}

// ========= QR 상태 메시지 표시 =========
function showQRStatus(message, type) {
    const qrStatusMessage = document.getElementById('qrStatusMessage');
    if (qrStatusMessage) {
        qrStatusMessage.textContent = message;
        qrStatusMessage.className = 'qr-status-message';
        if (type) {
            qrStatusMessage.classList.add(type);
        }
    }
}

// ========= 수동 입력 모드 표시 =========
function showManualInputMode() {
    const manualInputMode = document.querySelector('.manual-input-mode');
    if (manualInputMode) {
        manualInputMode.classList.add('active');
    }
}

function parseScannedPayload(rawValue) {
    if (!rawValue || typeof rawValue !== 'string') {
        return { trackingNumber: rawValue || '' };
    }
    
    const value = rawValue.trim();
    const fallback = { trackingNumber: value };
    
    if (!value) {
        return fallback;
    }

    // URL 인코딩된 텍스트까지 대비
    let decodedValue = value;
    try {
        decodedValue = decodeURIComponent(value);
    } catch (error) {
        decodedValue = value;
    }

    // 파레트 반납 전용 QR(신규 포맷): PALLET_RETURN|<pallet_id>|<company>|<product>|<kind>
    if (/^PALLET_RETURN\s*\|/i.test(decodedValue)) {
        const parts = decodedValue.split('|');
        const pid = (parts[1] || '').trim();
        if (pid) {
            return {
                mode: 'vendor_return',
                palletId: pid,
                trackingNumber: pid
            };
        }
    }

    // 자체 추적 QR (랙 섹션·사용중·보관종료) — PALLET_TRACK|<id>|...
    if (/^PALLET_TRACK\s*\|/i.test(decodedValue)) {
        const parts = decodedValue.split('|');
        const pid = (parts[1] || '').trim();
        if (pid) {
            return {
                mode: 'pallet_track',
                palletId: pid,
                trackingNumber: pid
            };
        }
    }

    // 기존 보관종료용 Google Form QR (반납 처리 대상 아님)
    if (decodedValue.indexOf('entry.419411235=') >= 0 && decodedValue.indexOf('entry.427884801=') >= 0) {
        return { mode: 'legacy_storage_qr', trackingNumber: value };
    }

    // 파레트 반납 전용 QR(신규 포맷): URL query mode=vendor_return&pallet_id=...
    try {
        const url = new URL(decodedValue);
        const qs = url.searchParams;
        const mode = (qs.get('mode') || '').trim();
        const pid = (qs.get('pallet_id') || qs.get('palletId') || '').trim();
        if (mode === 'vendor_return' && pid) {
            return {
                mode: 'vendor_return',
                palletId: pid,
                trackingNumber: pid
            };
        }
    } catch (error) {
        // URL이 아니면 다음 규칙으로 진행
    }
    
    // JSON 형태 ({ "sessionId": "...", "trackingNumber": "..." })
    try {
        const parsed = JSON.parse(decodedValue);
        if (parsed && parsed.mode === 'vendor_return' && (parsed.pallet_id || parsed.palletId)) {
            return {
                mode: 'vendor_return',
                palletId: parsed.pallet_id || parsed.palletId,
                trackingNumber: parsed.pallet_id || parsed.palletId
            };
        }
        if (parsed && (parsed.sessionId || parsed.trackingNumber || parsed.tracking)) {
            return {
                sessionId: parsed.sessionId || '',
                trackingNumber: parsed.trackingNumber || parsed.tracking || value
            };
        }
    } catch (error) {
        // JSON 파싱 실패 시 무시
    }
    
    // URL 또는 해시 쿼리 형태
    try {
        const url = new URL(decodedValue);
        const searchParams = extractSessionParams(url.search);
        const hashParams = extractSessionParams(url.hash);
        const sessionId = searchParams.sessionId || hashParams.sessionId || '';
        const trackingNumber = searchParams.trackingNumber || hashParams.trackingNumber || value;
        if (sessionId || searchParams.trackingNumber || hashParams.trackingNumber) {
            return { sessionId, trackingNumber };
        }
    } catch (error) {
        // URL 파싱 실패 시 무시
    }
    
    // sessionId= 형태의 단순 문자열
    if (value.includes('sessionId=')) {
        const inlineParams = extractSessionParams(value);
        if (inlineParams.sessionId || inlineParams.trackingNumber) {
            return {
                sessionId: inlineParams.sessionId || '',
                trackingNumber: inlineParams.trackingNumber || value
            };
        }
    }
    
    return fallback;
}

function qrEscHtml(text) {
    if (text == null || text === '') return '';
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}

let legacyGoogleFormQrUrl = '';

function showLegacyGoogleFormModal(url) {
    legacyGoogleFormQrUrl = (url || '').trim();
    const m = document.getElementById('legacyGoogleFormModal');
    if (m) m.classList.add('show');
}

function closeLegacyGoogleFormModal() {
    const m = document.getElementById('legacyGoogleFormModal');
    if (m) m.classList.remove('show');
    legacyGoogleFormQrUrl = '';
    setTimeout(() => startAutoQRScan(), 200);
}

async function openPalletTrackFlow(palletId) {
    const pid = (palletId || '').trim();
    if (!pid) {
        setTimeout(() => startAutoQRScan(), 200);
        return;
    }
    try {
        showQRStatus('파레트 정보 불러오는 중…', 'success');
        const res = await fetch('/api/pallets/mobile-track/info?pallet_id=' + encodeURIComponent(pid));
        const data = await res.json();
        if (!res.ok || !data.success) {
            alert((data && data.message) ? data.message : '불러오기 실패');
            setTimeout(() => startAutoQRScan(), 300);
            return;
        }
        fillAndShowPalletTrackModal(data.data);
    } catch (err) {
        console.error(err);
        alert('네트워크 오류');
        setTimeout(() => startAutoQRScan(), 300);
    }
}

function fillAndShowPalletTrackModal(payload) {
    const pallet = (payload && payload.pallet) ? payload.pallet : {};
    const sections = (payload && payload.rack_sections) ? payload.rack_sections : [];
    const infoEl = document.getElementById('palletTrackInfo');
    const sel = document.getElementById('palletTrackSectionSelect');
    const modal = document.getElementById('palletTrackModal');
    if (!infoEl || !sel || !modal) return;
    const lines = [
        '<strong>품목</strong> · ' + qrEscHtml(pallet.product_name || '-'),
        '<strong>화주사</strong> · ' + qrEscHtml(pallet.company_name || '-'),
        '<strong>파레트 ID</strong> · ' + qrEscHtml(pallet.pallet_id || '-'),
        '<strong>보관상태</strong> · ' + qrEscHtml(pallet.status || '-'),
        '<strong>현재 섹션</strong> · ' + qrEscHtml(pallet.rack_section_code || '(미지정)'),
        '<strong>사용 표시</strong> · ' + qrEscHtml(pallet.warehouse_use_status || '(없음)')
    ];
    infoEl.innerHTML = lines.join('<br>');
    let opts = '<option value="">— 섹션 선택 —</option>';
    sections.forEach(function (s) {
        const c = (s.code || '').trim();
        const lb = (s.label || c || '').trim();
        opts += '<option value="' + qrEscHtml(c) + '">' + qrEscHtml(lb) + '</option>';
    });
    sel.innerHTML = opts;
    const cur = (pallet.rack_section_code || '').trim();
    if (cur) {
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === cur) {
                sel.selectedIndex = i;
                break;
            }
        }
    }
    window._palletTrackActiveId = pallet.pallet_id || '';
    modal.classList.add('show');
}

function closePalletTrackModal() {
    const m = document.getElementById('palletTrackModal');
    if (m) m.classList.remove('show');
    window._palletTrackActiveId = '';
    setTimeout(() => startAutoQRScan(), 200);
}

async function postPalletTrackAction(action) {
    const pid = window._palletTrackActiveId;
    if (!pid) return;
    const sel = document.getElementById('palletTrackSectionSelect');
    const rack = sel ? (sel.value || '').trim() : '';
    const body = { pallet_id: pid, action: action };
    if (action === 'section_move') body.rack_section_code = rack;
    try {
        const res = await fetch('/api/pallets/mobile-track/action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
            alert((data && data.message) ? data.message : '처리 실패');
            return;
        }
        alert(data.message || '처리되었습니다.');
        closePalletTrackModal();
    } catch (err) {
        alert('오류: ' + (err.message || err));
    }
}

async function processVendorReturnByQr(rawValue, parsed) {
    try {
        showQRStatus('반납 QR 인식 완료. 반납 처리 중...', 'success');
        const response = await fetch('/api/pallets/vendor-return/by-qr', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                qr_text: rawValue,
                pallet_id: parsed && parsed.palletId ? parsed.palletId : ''
            })
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
            alert('반납 처리 실패: ' + ((data && data.message) ? data.message : '요청 오류'));
            setTimeout(() => startAutoQRScan(), 200);
            return;
        }
        const info = data.data || {};
        const company = info.company_name || '-';
        const pid = info.pallet_id || (parsed && parsed.palletId) || '-';
        await showReturnResultModal(company, pid);
        setTimeout(() => startAutoQRScan(), 200);
    } catch (error) {
        console.error('❌ 반납 QR 처리 오류:', error);
        alert('반납 처리 중 오류가 발생했습니다.');
        setTimeout(() => startAutoQRScan(), 200);
    }
}

function showReturnResultModal(company, palletId) {
    return new Promise(function(resolve) {
        const modal = document.getElementById('returnResultModal');
        const desc = document.getElementById('returnResultDesc');
        const chipCompany = document.getElementById('returnResultCompany');
        const chipPallet = document.getElementById('returnResultPallet');
        const confirmBtn = document.getElementById('returnResultConfirmBtn');
        if (!modal || !desc || !chipCompany || !chipPallet || !confirmBtn) {
            resolve();
            return;
        }

        const c = (company || '-').toString();
        const p = (palletId || '-').toString();
        desc.textContent = c + ' 화주의 파레트 반납 처리가 완료되었습니다.';
        chipCompany.textContent = '화주사: ' + c;
        chipPallet.textContent = '파레트: ' + p;

        const done = function() {
            modal.classList.remove('show');
            confirmBtn.removeEventListener('click', done);
            resolve();
        };

        confirmBtn.addEventListener('click', done);
        modal.classList.add('show');
    });
}

function extractSessionParams(fragment) {
    if (!fragment) {
        return { sessionId: '', trackingNumber: '' };
    }
    
    const cleaned = fragment.replace(/^[#?]/, '');
    try {
        const params = new URLSearchParams(cleaned);
        return {
            sessionId: params.get('sessionId') || '',
            trackingNumber: params.get('trackingNumber') || params.get('tracking') || ''
        };
    } catch (error) {
        return { sessionId: '', trackingNumber: '' };
    }
}

// ========= 수동 입력 처리 =========
function handleManualInput() {
    const trackingInput = document.getElementById('manualTrackingInput');
    const trackingNumber = trackingInput ? trackingInput.value.trim() : '';
    
    if (!trackingNumber) {
        alert('송장번호를 입력해주세요.');
        return;
    }
    
    currentTrackingNumber = trackingNumber;
    
    // 수동 입력 모드 숨기기
    const manualInputMode = document.querySelector('.manual-input-mode');
    if (manualInputMode) {
        manualInputMode.classList.remove('active');
    }
    
    // 데이터 검색
    searchReturnData(trackingNumber);
}

// ========= 오버레이 표시 =========
function showOverlay(title, desc, autoHide = null) {
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayDesc = document.getElementById('overlayDesc');
    
    if (overlayTitle) overlayTitle.textContent = title || '처리 중...';
    if (overlayDesc) overlayDesc.textContent = desc || '잠시만 기다려주세요.';
    if (overlay) overlay.classList.add('show');
    
    if (autoHide) {
        setTimeout(() => hideOverlay(), autoHide);
    }
}

// ========= 오버레이 숨기기 =========
function hideOverlay() {
    const overlay = document.getElementById('overlay');
    if (overlay) overlay.classList.remove('show');
}

// ========= 플래시 효과 =========
function flashEffect() {
    const flash = document.createElement('div');
    flash.style.cssText = `
        position: fixed;
        inset: 0;
        background: #fff;
        opacity: 0.8;
        z-index: 10000;
        pointer-events: none;
        animation: flash 0.2s ease-out;
    `;
    
    const style = document.createElement('style');
    style.textContent = `
        @keyframes flash {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }
    `;
    document.head.appendChild(style);
    document.body.appendChild(flash);
    
    setTimeout(() => {
        flash.remove();
        style.remove();
    }, 200);
}

(function bindPalletTrackAndLegacyUi() {
    var openLegacy = document.getElementById('legacyGoogleFormOpenBtn');
    if (openLegacy) {
        openLegacy.addEventListener('click', function() {
            if (legacyGoogleFormQrUrl) window.open(legacyGoogleFormQrUrl, '_blank', 'noopener');
        });
    }
    var closeLegacy = document.getElementById('legacyGoogleFormCloseBtn');
    if (closeLegacy) closeLegacy.addEventListener('click', closeLegacyGoogleFormModal);
    var secBtn = document.getElementById('palletTrackSectionBtn');
    if (secBtn) secBtn.addEventListener('click', function() { postPalletTrackAction('section_move'); });
    var useBtn = document.getElementById('palletTrackUseBtn');
    if (useBtn) useBtn.addEventListener('click', function() { postPalletTrackAction('in_use'); });
    var endBtn = document.getElementById('palletTrackEndBtn');
    if (endBtn) endBtn.addEventListener('click', function() {
        if (!confirm('이 파레트를 보관종료 처리할까요?')) return;
        postPalletTrackAction('storage_end');
    });
    var closePt = document.getElementById('palletTrackCloseBtn');
    if (closePt) closePt.addEventListener('click', closePalletTrackModal);
})();

window.uploadPhotos = uploadPhotos;
window.removePhoto = removePhoto;
window.handleManualInput = handleManualInput;
window.closeManualInput = function() {
    document.querySelector('.manual-input-mode').classList.remove('active');
};
