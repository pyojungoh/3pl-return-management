<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거래명세서</title>
  <style>
    #invContainer {
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .inv-tab-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .inv-tab-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #fffef9 0%, #ffffff 100%);
      color: #ff6b35;
      border: 2px solid #ffeaa7;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(255, 152, 0, 0.1);
    }
    .inv-tab-btn:hover {
      background: linear-gradient(135deg, #ff6b35 0%, #feca57 100%);
      color: white;
      border-color: #ff6b35;
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.25);
    }
    .inv-tab-btn.active {
      background: linear-gradient(135deg, #ff6b35 0%, #feca57 100%);
      color: white;
      border-color: #ff6b35;
    }
    .inv-tab-content {
      display: none;
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      border: 2px solid #ffeaa7;
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.1);
    }
    .inv-tab-content.active {
      display: block;
    }
    .inv-placeholder {
      text-align: center;
      padding: 60px 20px;
      color: #636e72;
      font-size: 16px;
    }
    .inv-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .inv-form-group label {
      display: block;
      font-weight: 600;
      color: #2d3436;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .inv-form-group input, .inv-form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #ffeaa7;
      border-radius: 8px;
      font-size: 14px;
    }
    .inv-form-group input:focus, .inv-form-group textarea:focus {
      outline: none;
      border-color: #ff6b35;
    }
    .inv-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #ff6b35 0%, #feca57 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .inv-btn:hover { opacity: 0.9; }
    .inv-btn-secondary {
      background: linear-gradient(135deg, #636e72 0%, #b2bec3 100%);
    }
    .inv-table { width: 100%; border-collapse: collapse; }
    .inv-table th, .inv-table td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .inv-table th {
      background: linear-gradient(135deg, #fffef9 0%, #ffffff 100%);
      color: #ff6b35;
      font-weight: 600;
    }
    .inv-table img { max-width: 50px; max-height: 50px; object-fit: contain; }
    .inv-no-data { text-align: center; padding: 40px; color: #999; }
    @media print {
      @page { size: A4; margin: 20mm; }
      body { margin: 0; padding: 15mm; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="invContainer">
    <div class="inv-tab-btns">
      <button type="button" class="inv-tab-btn active" id="invTabProductsBtn" onclick="invSwitchTab('products')">📦 상품등록</button>
      <button type="button" class="inv-tab-btn" id="invTabCustomersBtn" onclick="invSwitchTab('customers')">🏢 거래처등록</button>
      <button type="button" class="inv-tab-btn" id="invTabStatementsBtn" onclick="invSwitchTab('statements')">📄 거래명세서</button>
      <button type="button" class="inv-tab-btn" id="invTabSettlementsBtn" onclick="invSwitchTab('settlements')">💰 정산</button>
    </div>
    <div id="invTabProducts" class="inv-tab-content active">
      <div class="inv-section">
        <button type="button" class="inv-btn" onclick="invToggleProductForm()" id="invProductFormToggleBtn">➕ 상품 등록</button>
        <div id="invProductFormWrap" style="display:none; margin-top:16px; padding:20px; background:#fff9e6; border-radius:12px; border:2px solid #ffeaa7;">
          <h3 style="margin-bottom:16px; color:#ff6b35;">상품 등록/수정</h3>
          <div class="inv-form-grid">
            <div class="inv-form-group">
              <label>상품고유번호 *</label>
              <input type="text" id="invProductCode" placeholder="예: P001">
            </div>
            <div class="inv-form-group">
              <label>상품명 *</label>
              <input type="text" id="invProductName" placeholder="상품명">
            </div>
            <div class="inv-form-group">
              <label>카톤별 수량</label>
              <input type="number" id="invQtyPerCarton" value="1" min="1">
            </div>
            <div class="inv-form-group">
              <label>입고가(원)</label>
              <input type="number" id="invPurchasePrice" value="0" min="0">
            </div>
            <div class="inv-form-group">
              <label>도매가(원)</label>
              <input type="number" id="invWholesalePrice" value="0" min="0">
            </div>
            <div class="inv-form-group">
              <label>공동구매가(원)</label>
              <input type="number" id="invGroupBuyPrice" value="0" min="0">
            </div>
            <div class="inv-form-group">
              <label>일반판매가(원)</label>
              <input type="number" id="invRetailPrice" value="0" min="0">
            </div>
            <div class="inv-form-group">
              <label>유통기한(일)</label>
              <input type="number" id="invExpiryDays" placeholder="365" min="0">
            </div>
            <div class="inv-form-group">
              <label>카테고리</label>
              <input type="text" id="invCategory" placeholder="선택">
            </div>
          </div>
          <div class="inv-form-group" style="margin-bottom:12px;">
            <label>메모</label>
            <textarea id="invProductMemo" rows="2" placeholder="메모"></textarea>
          </div>
          <div class="inv-form-group" style="margin-bottom:12px;">
            <label>상품 사진</label>
            <input type="file" id="invProductImageInput" accept="image/*" onchange="invPreviewProductImage(event)">
            <div id="invProductImagePreview" style="margin-top:8px;"></div>
            <input type="hidden" id="invProductImageUrl">
          </div>
          <div style="display:flex; gap:10px;">
            <button type="button" class="inv-btn" onclick="invSaveProduct()">저장</button>
            <button type="button" class="inv-btn inv-btn-secondary" onclick="invResetProductForm()">취소</button>
          </div>
        </div>
      </div>
      <div style="margin-top:20px;">
        <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center;">
          <input type="text" id="invProductSearch" placeholder="상품코드/이름 검색" style="padding:8px 12px; border:2px solid #ffeaa7; border-radius:8px; width:200px;">
          <button type="button" class="inv-btn" onclick="invLoadProducts()">🔍 검색</button>
          <label><input type="checkbox" id="invIncludeInactive"> 비활성 포함</label>
        </div>
        <div style="overflow-x:auto;">
          <table class="inv-table">
            <thead>
              <tr>
                <th>순번</th>
                <th>상품코드</th>
                <th>상품명</th>
                <th>카톤수량</th>
                <th>입고가</th>
                <th>도매가</th>
                <th>공동구매가</th>
                <th>일반판매가</th>
                <th>유통기한</th>
                <th>사진</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="invProductTableBody">
              <tr><td colspan="11" class="inv-no-data">로딩 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="invTabCustomers" class="inv-tab-content">
      <div class="inv-section">
        <button type="button" class="inv-btn" onclick="invToggleCustomerForm()" id="invCustomerFormToggleBtn">➕ 거래처 등록</button>
        <div id="invCustomerFormWrap" style="display:none; margin-top:16px; padding:20px; background:#fff9e6; border-radius:12px; border:2px solid #ffeaa7;">
          <h3 style="margin-bottom:16px; color:#ff6b35;">거래처 등록/수정</h3>
          <div class="inv-form-grid">
            <div class="inv-form-group">
              <label>거래처명 *</label>
              <input type="text" id="invCustomerName" placeholder="거래처명">
            </div>
            <div class="inv-form-group">
              <label>연락처</label>
              <input type="text" id="invContactTel" placeholder="전화번호">
            </div>
            <div class="inv-form-group">
              <label>사업자번호</label>
              <input type="text" id="invBusinessNumber" placeholder="사업자번호">
            </div>
            <div class="inv-form-group">
              <label>대표자명</label>
              <input type="text" id="invRepresentative" placeholder="대표자">
            </div>
            <div class="inv-form-group" style="grid-column: 1 / -1;">
              <label>주소</label>
              <input type="text" id="invAddress" placeholder="주소">
            </div>
            <div class="inv-form-group">
              <label>화주사 연결</label>
              <label style="display:flex; align-items:center; gap:8px; font-weight:normal;">
                <input type="checkbox" id="invIndependentCustomer" onchange="invToggleCompanySelect()"> 독립 거래처 (화주사 무관)
              </label>
              <select id="invCompanySelect" style="margin-top:8px; padding:10px; border:2px solid #ffeaa7; border-radius:8px; width:100%;">
                <option value="">화주사 선택</option>
              </select>
            </div>
          </div>
          <div class="inv-form-group" style="margin-bottom:12px;">
            <label>메모</label>
            <textarea id="invCustomerMemo" rows="2" placeholder="메모"></textarea>
          </div>
          <div style="display:flex; gap:10px;">
            <button type="button" class="inv-btn" onclick="invSaveCustomer()">저장</button>
            <button type="button" class="inv-btn inv-btn-secondary" onclick="invResetCustomerForm()">취소</button>
          </div>
        </div>
      </div>
      <div style="margin-top:20px;">
        <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center; flex-wrap:wrap;">
          <select id="invCustomerFilter" onchange="invLoadCustomers()" style="padding:8px 12px; border:2px solid #ffeaa7; border-radius:8px;">
            <option value="">전체</option>
            <option value="null">독립 거래처만</option>
          </select>
          <button type="button" class="inv-btn" onclick="invLoadCustomers()">🔍 새로고침</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="inv-table">
            <thead>
              <tr>
                <th>순번</th>
                <th>거래처명</th>
                <th>연락처</th>
                <th>화주사</th>
                <th>대표자</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="invCustomerTableBody">
              <tr><td colspan="6" class="inv-no-data">로딩 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div id="invTabStatements" class="inv-tab-content">
      <div class="inv-section no-print">
        <button type="button" class="inv-btn" onclick="invToggleStatementForm()" id="invStatementFormToggleBtn">➕ 거래명세서 작성</button>
        <div id="invStatementFormWrap" style="display:none; margin-top:16px; padding:20px; background:#fff9e6; border-radius:12px; border:2px solid #ffeaa7;">
          <h3 style="margin-bottom:16px; color:#ff6b35;">거래명세서 작성</h3>
          <div class="inv-form-grid">
            <div class="inv-form-group">
              <label>거래일자 *</label>
              <input type="date" id="invStatementDate">
            </div>
            <div class="inv-form-group" style="grid-column: span 2;">
              <label>거래처 *</label>
              <select id="invStatementCustomer" style="padding:10px; border:2px solid #ffeaa7; border-radius:8px; width:100%;">
                <option value="">거래처 선택</option>
              </select>
            </div>
            <div class="inv-form-group" style="grid-column: span 2;">
              <label style="font-weight:600;">단가 기준 (부가세 10%)</label>
              <div style="display:flex; flex-wrap:wrap; gap:16px; margin-top:6px;">
                <label style="font-weight:500; cursor:pointer;">
                  <input type="radio" name="invStatementVatIncluded" value="0" checked> 부가세 미포함 (공급가 단가)
                </label>
                <label style="font-weight:500; cursor:pointer;">
                  <input type="radio" name="invStatementVatIncluded" value="1"> 부가세 포함 단가
                </label>
              </div>
            </div>
          </div>
          <div style="margin:16px 0;">
            <label style="font-weight:600;">품목</label>
            <div id="invStatementItemsHead" style="display:flex; align-items:center; gap:8px; margin-bottom:8px; padding:6px 4px; font-size:12px; font-weight:600; color:#555; border-bottom:2px solid #ffeaa7; flex-wrap:wrap;">
              <span style="min-width:200px;">상품</span>
              <span style="width:80px; text-align:center;">수량</span>
              <span id="invStatementHeadPrice" style="width:100px; text-align:center;">단가</span>
              <span id="invStatementHeadAmount" style="min-width:100px;">공급가액</span>
              <span style="width:72px;"></span>
            </div>
            <div id="invStatementItems"></div>
            <button type="button" class="inv-btn" style="margin-top:8px;" onclick="invAddStatementItem()">➕ 품목 추가</button>
          </div>
          <div class="inv-form-group">
            <label>비고</label>
            <textarea id="invStatementMemo" rows="2" placeholder="비고"></textarea>
          </div>
          <div style="display:flex; gap:10px;">
            <button type="button" class="inv-btn" onclick="invSaveStatement()">저장</button>
            <button type="button" class="inv-btn inv-btn-secondary" onclick="invResetStatementForm()">취소</button>
          </div>
        </div>
      </div>
      <div style="margin-top:20px;" class="no-print">
        <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center; flex-wrap:wrap;">
          <input type="date" id="invStatementStartDate" style="padding:8px; border:2px solid #ffeaa7; border-radius:8px;">
          <input type="date" id="invStatementEndDate" style="padding:8px; border:2px solid #ffeaa7; border-radius:8px;">
          <select id="invStatementFilterCustomer" style="padding:8px; border:2px solid #ffeaa7; border-radius:8px;">
            <option value="">전체 거래처</option>
          </select>
          <select id="invStatementFilterPaid" style="padding:8px; border:2px solid #ffeaa7; border-radius:8px;">
            <option value="">전체</option>
            <option value="0">미입금</option>
            <option value="1">입금완료</option>
          </select>
          <button type="button" class="inv-btn" onclick="invLoadStatements()">🔍 조회</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="inv-table">
            <thead>
              <tr>
                <th>순번</th>
                <th>명세서번호</th>
                <th>거래일자</th>
                <th>거래처</th>
                <th>공급가액</th>
                <th>세액</th>
                <th>합계</th>
                <th>입금</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="invStatementTableBody">
              <tr><td colspan="9" class="inv-no-data">조회 버튼을 클릭하세요</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div id="invStatementPrintArea" style="display:none; padding:20px; background:#fff;"></div>
    </div>
    <div id="invTabSettlements" class="inv-tab-content">
      <div class="inv-section">
        <h3 class="inv-section-title">📊 정산 요약</h3>
        <div class="inv-filter-row">
          <label>
            <input type="radio" name="invSettlementGroup" value="month" checked> 월별
          </label>
          <label>
            <input type="radio" name="invSettlementGroup" value="year"> 연별
          </label>
          <button type="button" class="inv-btn" onclick="invLoadSettlementSummary()">조회</button>
        </div>
        <div class="inv-table-wrap" style="max-height:200px;">
          <table class="inv-table">
            <thead>
              <tr>
                <th style="width:50px; text-align:center;">순번</th>
                <th>기간</th>
                <th style="text-align:right;">건수</th>
                <th style="text-align:right;">총액</th>
                <th style="text-align:right;">입금액</th>
                <th style="text-align:right;">미입금</th>
              </tr>
            </thead>
            <tbody id="invSettlementSummaryBody">
              <tr><td colspan="6" class="inv-no-data">조회 버튼을 클릭하세요</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="inv-section">
        <h3 class="inv-section-title">⚠️ 미정산(미입금) 명세서</h3>
        <div class="inv-table-wrap">
          <table class="inv-table">
            <thead>
              <tr>
                <th style="width:50px; text-align:center;">순번</th>
                <th>명세서번호</th>
                <th>거래일자</th>
                <th>거래처</th>
                <th style="text-align:right;">합계</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="invSettlementUnpaidBody">
              <tr><td colspan="6" class="inv-no-data">로딩 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js" crossorigin="anonymous"></script>
  <script>
    var invInitialized = false;
    var invCurrentTab = 'products';

    function invSwitchTab(tabName) {
      invCurrentTab = tabName;
      try { localStorage.setItem('invActiveTab', tabName); } catch (e) {}
      document.querySelectorAll('.inv-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.inv-tab-content').forEach(el => el.classList.remove('active'));
      const btn = document.getElementById('invTab' + tabName.charAt(0).toUpperCase() + tabName.slice(1) + 'Btn');
      const content = document.getElementById('invTab' + tabName.charAt(0).toUpperCase() + tabName.slice(1));
      if (btn) btn.classList.add('active');
      if (content) content.classList.add('active');
      if (tabName === 'products' && typeof invLoadProducts === 'function') invLoadProducts();
      if (tabName === 'customers') {
        if (typeof invLoadCompaniesForSelect === 'function') invLoadCompaniesForSelect();
        if (typeof invLoadCustomers === 'function') invLoadCustomers();
      }
      if (tabName === 'statements') {
        if (typeof invLoadStatementData === 'function') invLoadStatementData();
      }
      if (tabName === 'settlements') {
        if (typeof invLoadSettlementData === 'function') invLoadSettlementData();
      }
    }

    function invCommonInit() {
      if (invInitialized) return;
      const container = document.getElementById('invContainer');
      const invoiceTab = document.getElementById('invoiceTab');
      if (!container || !invoiceTab) return;
      if (invoiceTab.style.display === 'none' || invoiceTab.classList.contains('hidden')) return;

      const role = (window.currentRole || localStorage.getItem('client_role') || '').toString().trim();
      if (role !== '관리자') {
        container.innerHTML = '<div class="inv-placeholder" style="color:#e74c3c;">거래명세서는 관리자 전용 메뉴입니다.</div>';
        invInitialized = true;
        return;
      }

      invInitialized = true;
      var savedSub = '';
      try { savedSub = (localStorage.getItem('invActiveTab') || '').trim(); } catch (e) {}
      var validSubs = ['products', 'customers', 'statements', 'settlements'];
      if (savedSub && validSubs.indexOf(savedSub) >= 0) {
        invCurrentTab = savedSub;
        invSwitchTab(savedSub);
      } else {
        invLoadProducts();
      }
      var invStmtRoot = document.getElementById('invTabStatements');
      if (invStmtRoot) {
        invStmtRoot.addEventListener('change', function(e) {
          if (e.target && e.target.name === 'invStatementVatIncluded') {
            invUpdateStatementItemHeaderLabels();
            document.querySelectorAll('#invStatementItems .inv-statement-item').forEach(function(row) {
              var q = row.querySelector('.inv-item-qty');
              if (q) invCalcItemAmount(q);
            });
          }
        });
      }
      invUpdateStatementItemHeaderLabels();
      console.log('[INV] 거래명세서 초기화 완료');
    }
    window.invCommonInit = invCommonInit;

    function invGetUserHeaders() {
      const r = (window.currentRole || localStorage.getItem('client_role') || '').toString().trim();
      const c = (window.currentCompany || localStorage.getItem('client_company') || '').toString().trim();
      const u = (window.currentUsername || localStorage.getItem('client_username') || '').toString().trim();
      return {
        'Content-Type': 'application/json',
        'X-User-Role': encodeURIComponent(r),
        'X-Company-Name': encodeURIComponent(c),
        'X-User-Name': encodeURIComponent(u)
      };
    }

    var invEditingProductId = null;

    function invToggleProductForm() {
      const wrap = document.getElementById('invProductFormWrap');
      const btn = document.getElementById('invProductFormToggleBtn');
      if (wrap.style.display === 'none') {
        wrap.style.display = 'block';
        btn.textContent = '▼ 접기';
      } else {

    function invPreviewProductImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const base64 = ev.target.result;
        document.getElementById('invProductImageUrl').value = base64;
        document.getElementById('invProductImagePreview').innerHTML = '<img src="' + base64 + '" style="max-width:100px; max-height:100px; border-radius:8px;">';
      };

    function invSaveProduct() {
      const code = document.getElementById('invProductCode').value.trim();
      const name = document.getElementById('invProductName').value.trim();
      if (!code) { alert('상품고유번호를 입력하세요.'); return; }
      if (!name) { alert('상품명을 입력하세요.'); return; }

      let imageUrl = document.getElementById('invProductImageUrl').value.trim();
      if (imageUrl && imageUrl.startsWith('data:')) {
        const uploadPayload = {
          base64: imageUrl,
          filename: document.getElementById('invProductImageInput').files[0]?.name || code + '.jpg',
          product_code: code
        };
        fetch('/api/invoice/products/upload-image', {
          method: 'POST',
          headers: invGetUserHeaders(),
          credentials: 'include',
          body: JSON.stringify(uploadPayload)
        })
          .then(r => r.json())
          .then(data => {
            if (data.success) {
              imageUrl = data.url;
              invDoSaveProduct(imageUrl);
            } else {
              alert(data.message || '이미지 업로드 실패');
            }
          })
          .catch(err => {
            console.error(err);
            alert('이미지 업로드 중 오류');
          });
      } else {
        invDoSaveProduct(imageUrl || null);
      }
    }

    function invDoSaveProduct(imageUrl) {
      const payload = {
        product_code: document.getElementById('invProductCode').value.trim(),
        product_name: document.getElementById('invProductName').value.trim(),
        qty_per_carton: parseInt(document.getElementById('invQtyPerCarton').value) || 1,
        purchase_price: parseInt(document.getElementById('invPurchasePrice').value) || 0,
        wholesale_price: parseInt(document.getElementById('invWholesalePrice').value) || 0,
        group_buy_price: parseInt(document.getElementById('invGroupBuyPrice').value) || 0,
        retail_price: parseInt(document.getElementById('invRetailPrice').value) || 0,
        expiry_days: document.getElementById('invExpiryDays').value ? parseInt(document.getElementById('invExpiryDays').value) : null,
        category: document.getElementById('invCategory').value.trim() || null,
        memo: document.getElementById('invProductMemo').value.trim() || null,
        image_url: imageUrl
      };

      const url = invEditingProductId
        ? '/api/invoice/products/' + invEditingProductId
        : '/api/invoice/products';
      const method = invEditingProductId ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: invGetUserHeaders(),
        credentials: 'include',
        body: JSON.stringify(payload)
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            alert(data.message);
            invResetProductForm();
            invLoadProducts();
            if (invEditingProductId) invToggleProductForm();
          } else {
            alert(data.message || '저장 실패');

        .catch(err => {
          console.error(err);
          alert('저장 중 오류');
        });
    }

    function invEditStatement(id) {
      fetch('/api/invoice/statements/' + id, { credentials: 'include', headers: invGetUserHeaders() })
        .then(r => r.json())
        .then(data => {
          if (data.success && data.data) {
            const s = data.data;
            invEditingStatementId = s.id;
            document.getElementById('invStatementDate').value = s.statement_date || '';
            document.getElementById('invStatementCustomer').value = s.customer_id || '';
            document.getElementById('invStatementMemo').value = s.memo || '';
            var rInc = document.querySelector('input[name="invStatementVatIncluded"][value="1"]');
            var rExc = document.querySelector('input[name="invStatementVatIncluded"][value="0"]');
            if (s.vat_included === true || s.vat_included === 1) {
              if (rInc) rInc.checked = true;
            } else {
              if (rExc) rExc.checked = true;
            }
            invUpdateStatementItemHeaderLabels();
            document.getElementById('invStatementItems').innerHTML = '';
            var optsForEdit = invProductsList.slice();
            (s.items || []).forEach(function(it) {
              var found = optsForEdit.some(function(p) { return p.id === it.product_id; });
              if (!found && it.product_id) {
                optsForEdit.push({ id: it.product_id, product_code: '-', product_name: it.product_name || '-', wholesale_price: it.unit_price || 0, retail_price: it.unit_price || 0 });
              }
            });
            (s.items || []).forEach(function(it) {
              invStatementItemIndex++;
              const idx = invStatementItemIndex;
              const productOpts = optsForEdit.map(function(p) {
                return '<option value="' + p.id + '" data-wholesale="' + (p.wholesale_price || 0) + '" data-retail="' + (p.retail_price || 0) + '"' +
                  (p.id === it.product_id ? ' selected' : '') + '>' + (p.product_code === '-' ? p.product_name : (p.product_code + ' - ' + p.product_name)) + '</option>';
              }).join('');
              const container = document.getElementById('invStatementItems');
              const div = document.createElement('div');
              div.className = 'inv-statement-item';
              div.style.cssText = 'display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;';
              div.innerHTML = '<select class="inv-item-product" data-idx="' + idx + '" onchange="invOnProductSelect(this)" style="min-width:200px; padding:8px; border:2px solid #ffeaa7; border-radius:8px;">' +
                '<option value="">상품 선택</option>' + productOpts + '</select>' +
                '<input type="number" class="inv-item-qty" placeholder="수량" min="1" value="' + (it.qty || 1) + '" style="width:80px; padding:8px; border:2px solid #ffeaa7; border-radius:8px;" onchange="invCalcItemAmount(this)" oninput="invCalcItemAmount(this)">' +
                '<input type="number" class="inv-item-price" placeholder="단가" min="0" value="' + (it.unit_price || 0) + '" style="width:100px; padding:8px; border:2px solid #ffeaa7; border-radius:8px;" onchange="invCalcItemAmount(this)" oninput="invCalcItemAmount(this)">' +
                '<span class="inv-item-amount" style="min-width:80px;">' + (it.amount || 0).toLocaleString() + '</span>' +
                '<button type="button" class="inv-btn inv-btn-secondary" style="padding:6px 10px; font-size:12px;" onclick="this.closest(\'.inv-statement-item\').remove()">삭제</button>';
              container.appendChild(div);
            });
            if (!s.items || s.items.length === 0) invAddStatementItem();
            document.getElementById('invStatementFormWrap').style.display = 'block';
            document.getElementById('invStatementFormToggleBtn').textContent = '▼ 접기';
            invLoadCustomersForStatementSelect();
          }
        })
        .catch(err => console.error(err));
    }

    function invToggleStatementForm() {
      const wrap = document.getElementById('invStatementFormWrap');
      const btn = document.getElementById('invStatementFormToggleBtn');
      if (wrap.style.display === 'none') {
        wrap.style.display = 'block';
        btn.textContent = '▼ 접기';
        document.getElementById('invStatementDate').value = new Date().toISOString().slice(0, 10);
        invLoadCustomersForStatementSelect();
        invResetStatementForm();
      } else {
        wrap.style.display = 'none';
        btn.textContent = '➕ 거래명세서 작성';
        invEditingStatementId = null;
      }
    }

    function invAddStatementItem() {
      const container = document.getElementById('invStatementItems');
      const idx = invStatementItemIndex++;
      const productOpts = invProductsList.map(p =>
        '<option value="' + p.id + '" data-wholesale="' + (p.wholesale_price || 0) + '" data-retail="' + (p.retail_price || 0) + '">' +
        (p.product_code || '') + ' - ' + (p.product_name || '') + '</option>'
      ).join('');
      const div = document.createElement('div');
      div.className = 'inv-statement-item';
      div.style.cssText = 'display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;';
      div.innerHTML = '<select class="inv-item-product" data-idx="' + idx + '" onchange="invOnProductSelect(this)" style="min-width:200px; padding:8px; border:2px solid #ffeaa7; border-radius:8px;">' +
        '<option value="">상품 선택</option>' + productOpts + '</select>' +
        '<input type="number" class="inv-item-qty" placeholder="수량" min="1" value="1" style="width:80px; padding:8px; border:2px solid #ffeaa7; border-radius:8px;" onchange="invCalcItemAmount(this)" oninput="invCalcItemAmount(this)">' +
        '<input type="number" class="inv-item-price" placeholder="단가" min="0" value="0" style="width:100px; padding:8px; border:2px solid #ffeaa7; border-radius:8px;" onchange="invCalcItemAmount(this)" oninput="invCalcItemAmount(this)">' +
        '<span class="inv-item-amount" style="min-width:80px;">0</span>' +
        '<button type="button" class="inv-btn inv-btn-secondary" style="padding:6px 10px; font-size:12px;" onclick="this.closest(\'.inv-statement-item\').remove()">삭제</button>';
      container.appendChild(div);
    }

    function invOnProductSelect(sel) {
      const opt = sel.options[sel.selectedIndex];
      if (opt && opt.value) {
        const price = parseInt(opt.dataset.wholesale) || parseInt(opt.dataset.retail) || 0;
        const row = sel.closest('.inv-statement-item');
        if (row) {
          row.querySelector('.inv-item-price').value = price;
          invCalcItemAmount(sel);
        }
      }
    }

    function invCalcItemAmount(el) {
      const row = el.closest('.inv-statement-item');
      if (!row) return;
      const qty = parseInt(row.querySelector('.inv-item-qty').value) || 0;
      const price = parseInt(row.querySelector('.inv-item-price').value) || 0;
      const span = row.querySelector('.inv-item-amount');
      if (invIsStatementVatIncluded()) {
        const gross = qty * price;
        const supply = Math.round(gross / 1.1);
        span.textContent = gross.toLocaleString() + ' (공급 ' + supply.toLocaleString() + ')';
      } else {
        span.textContent = (qty * price).toLocaleString();
      }
    }

    function invResetStatementForm() {
      invEditingStatementId = null;
      var rExc = document.querySelector('input[name="invStatementVatIncluded"][value="0"]');
      if (rExc) rExc.checked = true;
      invUpdateStatementItemHeaderLabels();
      document.getElementById('invStatementItems').innerHTML = '';
      document.getElementById('invStatementMemo').value = '';
      invAddStatementItem();
    }

    function invSaveStatement() {
      const date = document.getElementById('invStatementDate').value.trim();
      const customerId = document.getElementById('invStatementCustomer').value;
      if (!date) { alert('거래일자를 입력하세요.'); return; }
      if (!customerId) { alert('거래처를 선택하세요.'); return; }

      const items = [];
      document.querySelectorAll('.inv-statement-item').forEach(row => {
        const productSel = row.querySelector('.inv-item-product');
        const productOpt = productSel.options[productSel.selectedIndex];
        const productId = productSel.value;
        const productName = productOpt ? productOpt.text : '-';
        const qty = parseInt(row.querySelector('.inv-item-qty').value) || 0;
        const price = parseInt(row.querySelector('.inv-item-price').value) || 0;
        if (productId && qty > 0) {
          items.push({ product_id: productId, product_name: productName, qty: qty, unit_price: price });
        }
      });
      if (items.length === 0) { alert('품목을 1개 이상 추가하세요.'); return; }

      const payload = {
        statement_date: date,
        customer_id: customerId,
        memo: document.getElementById('invStatementMemo').value.trim() || null,
        vat_included: invIsStatementVatIncluded() ? 1 : 0,
        items: items
      };
      const url = invEditingStatementId ? '/api/invoice/statements/' + invEditingStatementId : '/api/invoice/statements';
      const method = invEditingStatementId ? 'PUT' : 'POST';

      fetch(url, {
        method: method,
        headers: invGetUserHeaders(),
        credentials: 'include',
        body: JSON.stringify(payload)
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            alert(data.message + (data.statement_no ? ' (번호: ' + data.statement_no + ')' : ''));
            invResetStatementForm();
            invLoadStatements();
            invToggleStatementForm();
            if (typeof invLoadSettlementSummary === 'function') invLoadSettlementSummary();
            if (typeof invLoadSettlementUnpaid === 'function') invLoadSettlementUnpaid();
          } else {
            alert(data.message || '저장 실패');
          }
        })
        .catch(err => {
          console.error(err);
          alert('저장 중 오류');
        });
    }

    function invLoadStatements() {
      const start = document.getElementById('invStatementStartDate').value;
      const end = document.getElementById('invStatementEndDate').value;
      const customerId = document.getElementById('invStatementFilterCustomer').value;
      const isPaid = document.getElementById('invStatementFilterPaid').value;
      let url = '/api/invoice/statements?';
      if (start) url += 'start_date=' + encodeURIComponent(start) + '&';
      if (end) url += 'end_date=' + encodeURIComponent(end) + '&';
      if (customerId) url += 'customer_id=' + encodeURIComponent(customerId) + '&';
      if (isPaid) url += 'is_paid=' + encodeURIComponent(isPaid) + '&';

      const tbody = document.getElementById('invStatementTableBody');
      tbody.innerHTML = '<tr><td colspan="9" class="inv-no-data">로딩 중...</td></tr>';

      fetch(url, { credentials: 'include', headers: invGetUserHeaders() })
        .then(r => r.json())
        .then(data => {
          if (data.success && data.data) {
            invRenderStatementList(data.data);
          } else {
            tbody.innerHTML = '<tr><td colspan="9" class="inv-no-data">' + (data.message || '조회 실패') + '</td></tr>';
          }
        })
        .catch(err => {
          console.error(err);
          tbody.innerHTML = '<tr><td colspan="9" class="inv-no-data">목록 로드 실패</td></tr>';
        });
    }

    function invRenderStatementList(items) {
      const tbody = document.getElementById('invStatementTableBody');
      if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="inv-no-data">조회 결과가 없습니다.</td></tr>';
        return;
      }
      tbody.innerHTML = items.map((s, i) => {
        const paidBtn = (s.is_paid === true || s.is_paid === 1)
          ? '<span style="color:#27ae60;">입금완료</span>'
          : '<button type="button" class="inv-btn" style="padding:6px 12px; font-size:12px;" onclick="invMarkPaid(' + s.id + ')">입금처리</button>';
        return '<tr><td>' + (i + 1) + '</td><td>' + (s.statement_no || '') + '</td><td>' + (s.statement_date || '') +
          '</td><td>' + (s.customer_name || '') + '</td><td>' + (s.total_amount || 0).toLocaleString() +
          '</td><td>' + (s.vat_amount || 0).toLocaleString() + '</td><td>' + (s.grand_total || 0).toLocaleString() +
          '</td><td>' + paidBtn + '</td><td>' +
          '<button type="button" class="inv-btn" style="padding:6px 12px; font-size:12px;" onclick="invEditStatement(' + s.id + ')">수정</button> ' +
          '<button type="button" class="inv-btn" style="padding:6px 12px; font-size:12px;" onclick="invPrintStatement(' + s.id + ')">🖨️ 프린트</button> ' +
          '<button type="button" class="inv-btn" style="padding:6px 10px; font-size:12px;" onclick="invDownloadStatement(' + s.id + ')">PDF</button></td></tr>';
      }).join('');
    }

    function invMarkPaid(id) {
      if (!confirm('입금 완료 처리하시겠습니까?')) return;
      fetch('/api/invoice/statements/' + id + '/paid', {
        method: 'PUT',
        credentials: 'include',
        headers: invGetUserHeaders()
      })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            alert(data.message);
            if (typeof invLoadStatements === 'function') invLoadStatements();
            if (typeof invLoadSettlementUnpaid === 'function') invLoadSettlementUnpaid();
            if (typeof invLoadSettlementSummary === 'function') invLoadSettlementSummary();
          } else {
            alert(data.message || '처리 실패');
          }
        })
        .catch(err => { console.error(err); alert('처리 중 오류'); });
    }

    function invSanitizeFileName(name) {
      var n = String(name || '거래명세서').replace(/[/\\?%*:|"<>]/g, '-').trim();
      return n || '거래명세서';
    }

    /** jsPDF UMD: global 형태가 빌드·CDN마다 달라서 모두 시도 */
    function invGetJsPDFConstructor() {
      var g = window.jspdf;
      if (!g) return null;
      if (typeof g.jsPDF === 'function') return g.jsPDF;
      if (typeof g.default === 'function') return g.default;
      if (typeof g === 'function') return g;
      return null;
    }

    /** 명세서 워터마크 — Cloudinary (서버 /static 없이 동작, 인쇄·html2canvas 공통) */
    function invInvoiceWatermarkAbsUrl() {
      return 'https://res.cloudinary.com/dokk81rjh/image/upload/v1763517440/jayjay_favicon_512_sxrfoo.png';
    }

    /** html2canvas는 외부 URL img를 CORS로 못 그리는 경우가 많아, PDF 전용으로 Data URL로 넣음 */
    function invPrefetchImageAsDataUrl(url) {
      return fetch(url, { mode: 'cors', credentials: 'omit', cache: 'force-cache' })
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.blob();
        })
        .then(function(blob) {
          return new Promise(function(resolve, reject) {
            var fr = new FileReader();
            fr.onload = function() { resolve(fr.result); };
            fr.onerror = function() { reject(new Error('FileReader')); };
            fr.readAsDataURL(blob);
          });
        });
    }

    function invPrintStatement(id) {
      fetch('/api/invoice/statements/' + id, { credentials: 'include', headers: invGetUserHeaders() })
        .then(r => r.json())
        .then(data => {
          if (!data.success || !data.data) {
            alert(data.message || '명세서를 불러올 수 없습니다.');
            return;
          }
          const doc = invBuildStatementPrintContent(data.data);
          const printWin = window.open('', '_blank');
          printWin.document.write('<html><head><meta charset="UTF-8"><title>거래명세서 ' + (data.data.statement_no || '') + '</title><style>' + doc.printStyles + '</style></head><body>' + doc.html + '</body></html>');
          printWin.document.close();
          var invPrintOnce = false;
          function invDoPrintWinPrint() {
            if (invPrintOnce) return;
            invPrintOnce = true;
            try {
              printWin.focus();
              printWin.print();
              printWin.close();
            } catch (e) { console.error(e); }
          }
          var wmImg = printWin.document.querySelector('img.inv-print-watermark');
          if (wmImg && !wmImg.complete) {
            wmImg.onload = function() { setTimeout(invDoPrintWinPrint, 150); };
            wmImg.onerror = function() { setTimeout(invDoPrintWinPrint, 150); };
            setTimeout(invDoPrintWinPrint, 2500);
          } else {
            setTimeout(invDoPrintWinPrint, 400);
          }
        })
        .catch(err => { console.error(err); alert('명세서 로드 실패'); });
    }

    function invDownloadStatement(id) {
      if (typeof html2canvas === 'undefined') {
        alert('화면 캡처 라이브러리를 불러오지 못했습니다. 페이지를 새로고침한 뒤 다시 시도하세요.');
        return;
      }
      var JsPDF = invGetJsPDFConstructor();
      if (!JsPDF) {
        alert('PDF 라이브러리를 불러오지 못했습니다. 페이지를 새로고침한 뒤 다시 시도하세요.');
        return;
      }
      fetch('/api/invoice/statements/' + id, { credentials: 'include', headers: invGetUserHeaders() })
        .then(r => r.json())
        .then(data => {
          if (!data.success || !data.data) {
            alert(data.message || '명세서를 불러올 수 없습니다.');
            return;
          }
          const doc = invBuildStatementPrintContent(data.data);
          var prevSt = document.getElementById('inv-cap-style-temp');
          if (prevSt) prevSt.remove();
          var st = document.createElement('style');
          st.id = 'inv-cap-style-temp';
          /* 인쇄 @page margin(6mm 7mm)과 동일: A4 용지 안쪽 여백 + 본문 */
          st.textContent = doc.printStyles +
            'html,body{height:auto!important;overflow:visible!important;margin:0;background:#fff;}' +
            '.inv-capture-page{width:210mm;min-height:297mm;box-sizing:border-box;padding:6mm 7mm;background:#fff;}' +
            '.inv-capture-page .inv-print-root{min-height:auto!important;width:100%!important;max-width:100%!important;margin:0!important;}' +
            '.inv-capture-page .inv-print-foreground{min-height:auto!important;}';
          document.head.appendChild(st);
          var wrap = document.createElement('div');
          wrap.id = 'inv-cap-wrap-temp';
          wrap.style.cssText = 'position:fixed;left:-12000px;top:0;background:#fff;';
          wrap.innerHTML = '<div class="inv-capture-page">' + doc.html + '</div>';
          document.body.appendChild(wrap);
          var pageEl = wrap.querySelector('.inv-capture-page');
          if (!pageEl) {
            wrap.remove();
            st.remove();
            alert('명세서 영역을 찾을 수 없습니다.');
            return;
          }
          var invPdfCaptureOnce = false;
          function invRunHtml2CanvasPdf() {
            if (invPdfCaptureOnce) return;
            invPdfCaptureOnce = true;
            html2canvas(pageEl, {
              scale: 2,
              backgroundColor: '#ffffff',
              logging: false,
              useCORS: true,
              allowTaint: false,
              imageTimeout: 20000
            })
              .then(function(canvas) {
                wrap.remove();
                st.remove();
                if (!canvas.width || !canvas.height) {
                  alert('캔버스가 비어 있습니다. 다시 시도해 주세요.');
                  return;
                }
                try {
                  var imgData = canvas.toDataURL('image/png');
                  var pdf = new JsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
                  var pageW = pdf.internal.pageSize.getWidth();
                  var pageH = pdf.internal.pageSize.getHeight();
                  var cw = canvas.width;
                  var ch = canvas.height;
                  var ratio = cw / ch;
                  var imgW = pageW;
                  var imgH = pageW / ratio;
                  if (imgH > pageH) {
                    imgH = pageH;
                    imgW = pageH * ratio;
                  }
                  var x = (pageW - imgW) / 2;
                  var y = (pageH - imgH) / 2;
                  pdf.addImage(imgData, 'PNG', x, y, imgW, imgH);
                  pdf.save(doc.fileBase + '.pdf');
                } catch (e) {
                  console.error(e);
                  alert('파일 저장 중 오류가 발생했습니다: ' + (e.message || String(e)));
                }
              })
              .catch(function(err) {
                wrap.remove();
                st.remove();
                console.error(err);
                alert('이미지 변환에 실패했습니다.');
              });
          }
          function invSchedulePdfCapture() {
            requestAnimationFrame(function() {
              requestAnimationFrame(function() {
                setTimeout(invRunHtml2CanvasPdf, 100);
              });
            });
          }
          var wmCap = pageEl.querySelector('img.inv-print-watermark');
          var wmRemoteUrl = invInvoiceWatermarkAbsUrl();
          if (wmCap && wmRemoteUrl) {
            invPrefetchImageAsDataUrl(wmRemoteUrl)
              .then(function(dataUrl) {
                wmCap.removeAttribute('crossorigin');
                wmCap.src = dataUrl;
                return new Promise(function(resolve) {
                  function done() { setTimeout(resolve, 100); }
                  if (wmCap.complete && wmCap.naturalWidth) done();
                  else {
                    wmCap.onload = done;
                    wmCap.onerror = done;
                    setTimeout(done, 2500);
                  }
                });
              })
              .catch(function(e) {
                console.warn('[INV] 워터마크 prefetch 실패(PDF는 진행):', e);
              })
              .then(function() {
                invSchedulePdfCapture();
              });
          } else {
            invSchedulePdfCapture();
          }
        })
        .catch(function(err) {
          console.error(err);
          alert('명세서 로드 실패');
        });
    }

    function invLoadSettlementData() {
      invLoadSettlementSummary();
      invLoadSettlementUnpaid();
    }

    function invLoadSettlementSummary() {
      const radio = document.querySelector('input[name="invSettlementGroup"]:checked');
      const group = (radio && radio.value) ? radio.value : 'month';
      fetch('/api/invoice/settlements/summary?group=' + group, {
        credentials: 'include',
        headers: invGetUserHeaders()
      })
        .then(r => r.json())
        .then(data => {
          const tbody = document.getElementById('invSettlementSummaryBody');
          if (!tbody) return;
          if (!data.success || !data.data || data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="inv-no-data">조회 결과가 없습니다.</td></tr>';
            return;
          }
          tbody.innerHTML = data.data.map((row, i) =>
            '<tr><td style="text-align:center">' + (i + 1) + '</td><td>' + (row.period || '') + '</td>' +
            '<td style="text-align:right">' + (row.cnt || 0).toLocaleString() + '</td>' +
            '<td style="text-align:right">' + (row.total_amount || 0).toLocaleString() + '</td>' +
            '<td style="text-align:right">' + (row.paid_amount || 0).toLocaleString() + '</td>' +
            '<td style="text-align:right; color:' + ((row.unpaid_amount || 0) > 0 ? '#e74c3c' : '#27ae60') + ';">' + (row.unpaid_amount || 0).toLocaleString() + '</td></tr>'
          ).join('');
        })
        .catch(err => {
          console.error(err);
          const tbody = document.getElementById('invSettlementSummaryBody');
          if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="inv-no-data">조회 실패</td></tr>';
        });
    }

    function invLoadSettlementUnpaid() {
      const tbody = document.getElementById('invSettlementUnpaidBody');
      if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="inv-no-data">로딩 중...</td></tr>';
      fetch('/api/invoice/settlements/unpaid', {
        credentials: 'include',
        headers: invGetUserHeaders()
      })
        .then(r => r.json())
        .then(data => {
          if (!tbody) return;
          if (!data.success || !data.data || data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="inv-no-data">미입금 명세서가 없습니다.</td></tr>';
            return;
          }
          tbody.innerHTML = data.data.map((s, i) =>
            '<tr><td style="text-align:center">' + (i + 1) + '</td><td>' + (s.statement_no || '') + '</td><td>' + (s.statement_date || '') +
            '</td><td>' + (s.customer_name || '') + '</td><td style="text-align:right">' + (s.grand_total || 0).toLocaleString() +
            '</td><td style="white-space:normal;max-width:320px;"><button type="button" class="inv-btn" style="padding:6px 10px; font-size:12px;" onclick="invEditStatementFromSettlement(' + s.id + ')">수정</button> ' +
            '<button type="button" class="inv-btn inv-btn-secondary" style="padding:6px 10px; font-size:12px;" onclick="invDeleteUnpaidStatement(' + s.id + ')">삭제</button> ' +
            '<button type="button" class="inv-btn" style="padding:6px 10px; font-size:12px;" onclick="invMarkPaid(' + s.id + ')">입금처리</button> ' +
            '<button type="button" class="inv-btn" style="padding:6px 10px; font-size:12px;" onclick="invPrintStatement(' + s.id + ')">🖨️ 프린트</button> ' +
            '<button type="button" class="inv-btn" style="padding:6px 8px; font-size:11px;" onclick="invDownloadStatement(' + s.id + ')">PDF</button></td></tr>'
          ).join('');
        })
        .catch(err => {
          console.error(err);
          if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="inv-no-data">조회 실패</td></tr>';
        });
    }
  </script>
