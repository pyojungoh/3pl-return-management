<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mobile">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mobile</title>
  <link rel="manifest" href="/static/manifest-mobile.json">
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dokk81rjh/image/upload/v1763517440/jayjay_favicon_512_sxrfoo.png">
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dokk81rjh/image/upload/v1763517440/jayjay_favicon_512_sxrfoo.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://res.cloudinary.com/dokk81rjh/image/upload/v1763517440/jayjay_favicon_512_sxrfoo.png">
  <link rel="stylesheet" href="/static/css/mobile-ops-portal.css">
</head>
<body class="mop-body">
  <!-- 로그인: 대시보드와 동일 localStorage 키 사용 -->
  <section id="mopLogin" class="mop-login">
    <h1>Mobile</h1>
    <p>관리자·화주사 계정으로 로그인합니다. C/S를 빠르게 확인합니다.</p>
    <form id="mopLoginForm" autocomplete="on">
      <div class="mop-field">
        <label for="mopUser">아이디</label>
        <input id="mopUser" name="username" class="mop-input" type="text" autocomplete="username" required>
      </div>
      <div class="mop-field">
        <label for="mopPass">비밀번호</label>
        <input id="mopPass" name="password" class="mop-input" type="password" autocomplete="current-password" required>
      </div>
      <div class="mop-field mop-field--check">
        <label class="mop-check-label" for="mopRemember">
          <input type="checkbox" id="mopRemember" name="remember">
          <span>자동 로그인</span>
        </label>
        <p class="mop-check-hint">이 기기 브라우저에만 저장됩니다. 공용 기기에서는 사용하지 마세요.</p>
      </div>
      <button type="submit" class="mop-btn mop-btn--primary">로그인</button>
    </form>
    <div id="mopLoginMsg" class="mop-msg" role="status"></div>
  </section>

  <div id="mopApp" class="mop-hidden">
    <header class="mop-header">
      <div>
        <h1 class="mop-header__title" id="mopHeaderTitle">C/S</h1>
        <p id="mopHeaderSub" class="mop-header__sub"></p>
      </div>
      <div class="mop-header__actions">
        <button type="button" id="mopRefresh" class="mop-icon-btn" title="새로고침">새로고침</button>
        <button type="button" id="mopLogout" class="mop-icon-btn" title="로그아웃">나가기</button>
      </div>
    </header>

    <div class="mop-toolbar">
      <div class="mop-toolbar__row">
        <select id="mopMonth" class="mop-select" aria-label="조회 월"></select>
      </div>
      <div id="mopCompanyWrap" class="mop-toolbar__row mop-hidden">
        <select id="mopCompany" class="mop-select" aria-label="화주사 필터"></select>
      </div>
    </div>

    <nav class="mop-tabs" aria-label="주 메뉴">
      <button type="button" class="mop-tab mop-tab--active" id="mopTabCs" data-mop-pane="cs" aria-current="page">C/S</button>
      <button type="button" class="mop-tab" id="mopTabSw" data-mop-pane="sw">특수작업</button>
      <a href="/qr-photo" class="mop-tab mop-tab--link">QR</a>
    </nav>

    <div id="mopPaneCs" class="mop-pane">
      <div class="mop-chips" role="toolbar" aria-label="상태 필터">
        <button type="button" id="mopChipAll" class="mop-chip mop-chip--on">전체</button>
        <button type="button" id="mopChipPending" class="mop-chip">미처리</button>
        <button type="button" id="mopChipDone" class="mop-chip">완료·불가</button>
        <button type="button" id="mopChipHold" class="mop-chip">보류</button>
      </div>
      <div id="mopCsList" class="mop-list" role="list"></div>
    </div>

    <div id="mopPaneSw" class="mop-pane mop-hidden">
      <div class="mop-sw-bar">
        <button type="button" id="mopSwRegisterBtn" class="mop-btn mop-btn--primary mop-btn--sw-register mop-hidden">작업 등록</button>
      </div>
      <div id="mopSwList" class="mop-list mop-list--sw" role="list"></div>
    </div>

    <p class="mop-footer-link"><a href="/">PC 대시보드로 이동</a></p>
  </div>

  <div id="mopSheetBackdrop" class="mop-sheet-backdrop mop-hidden" role="presentation">
    <div class="mop-sheet" role="dialog" aria-modal="true" onclick="event.stopPropagation();">
      <div id="mopSheetBody"></div>
    </div>
  </div>

  <div id="mopSwModalBackdrop" class="mop-modal-backdrop mop-hidden" role="presentation">
    <div class="mop-modal" role="dialog" aria-modal="true" aria-labelledby="mopSwModalTitle" onclick="event.stopPropagation();">
      <div class="mop-modal__head">
        <h2 class="mop-modal__title" id="mopSwModalTitle">작업 등록</h2>
        <button type="button" class="mop-sheet__close" id="mopSwModalClose" aria-label="닫기">×</button>
      </div>
      <div class="mop-modal__body">
        <label class="mop-sheet__label" for="mopSwFormCompany">화주사</label>
        <select id="mopSwFormCompany" class="mop-select mop-select--full"></select>
        <label class="mop-sheet__label" for="mopSwFormDate">작업일</label>
        <input type="date" id="mopSwFormDate" class="mop-input">
        <label class="mop-sheet__label" for="mopSwFormType">작업 종류</label>
        <select id="mopSwFormType" class="mop-select mop-select--full"></select>
        <div class="mop-sw-form-row">
          <div>
            <label class="mop-sheet__label" for="mopSwFormQty">수량</label>
            <input type="number" id="mopSwFormQty" class="mop-input" min="1" step="1" value="1">
          </div>
          <div>
            <label class="mop-sheet__label" for="mopSwFormPrice">단가</label>
            <input type="number" id="mopSwFormPrice" class="mop-input" min="0" step="1" value="0">
          </div>
        </div>
        <label class="mop-sheet__label" for="mopSwFormPhotos">사진</label>
        <button type="button" class="mop-btn mop-btn--ghost mop-btn--photo-pick" id="mopSwPhotoPick">카메라·앨범에서 추가</button>
        <input type="file" id="mopSwFormPhotos" class="mop-hidden" accept="image/*" capture="environment" multiple>
        <div id="mopSwPhotoPreview" class="mop-sw-photo-preview"></div>
        <label class="mop-sheet__label" for="mopSwFormMemo">메모</label>
        <textarea id="mopSwFormMemo" class="mop-input mop-textarea" rows="2" placeholder="선택"></textarea>
        <button type="button" class="mop-btn mop-btn--primary" id="mopSwFormSubmit">등록하기</button>
      </div>
    </div>
  </div>

  <div id="mopToast" class="mop-toast" role="status" aria-live="polite"></div>

  <script src="/static/js/mobile-ops-portal.js" defer></script>
</body>
</html>
